{% extends "base.html" %}
{% block title %}Add Product — OptimizePro{% endblock %}
{% block content %}
<div class="page-header">
    <h1>Add Product</h1>
    <a href="{{ url_for('products.list_products') }}" class="btn btn-secondary">← Back</a>
</div>
<div class="card" style="max-width: 600px;">
    <form method="POST">
        <div class="grid-2">
            <div class="form-group">
                <label for="sku">SKU</label>
                <input type="text" id="sku" name="sku" class="form-control" placeholder="e.g. WH-1000XM5" required>
            </div>
            <div class="form-group">
                <label for="category">Category</label>
                <input type="text" id="category" name="category" class="form-control" placeholder="e.g. Electronics" value="General">
            </div>
        </div>
        <div class="form-group">
            <label for="name">Product Name</label>
            <input type="text" id="name" name="name" class="form-control" placeholder="e.g. Sony WH-1000XM5 Headphones" required>
        </div>
        <div class="grid-2">
            <div class="form-group">
                <label for="cost_price">Cost Price (₹)</label>
                <input type="number" id="cost_price" name="cost_price" class="form-control" step="0.01" min="0" value="0" required>
            </div>
            <div class="form-group">
                <label for="quantity">Warehouse Quantity</label>
                <input type="number" id="quantity" name="quantity" class="form-control" min="0" value="0" required>
            </div>
        </div>

        {% if marketplaces %}
        <div class="form-group">
            <label>List on Marketplaces</label>
            <div class="mp-listing-grid">
                {% for mp in marketplaces %}
                <div class="mp-listing-item">
                    <input type="checkbox" id="mp_{{ mp.id }}" name="mp_{{ mp.id }}_listed" value="1">
                    <label for="mp_{{ mp.id }}" style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer; margin: 0;">
                        <span class="mp-dot" style="background: {{ mp.color }}; width: 10px; height: 10px; border-radius: 50%;"></span>
                        {{ mp.name }}
                    </label>
                    <input type="number" name="mp_{{ mp.id }}_price" class="mp-price-input" placeholder="Selling price" step="0.01" min="0">
                </div>
                {% endfor %}
            </div>
        </div>
        {% endif %}

        <button type="submit" class="btn btn-primary">Add Product</button>
    </form>
</div>
{% endblock %}
