{% extends "base.html" %}
{% block title %}Register — OptimizePro{% endblock %}
{% block auth_content %}
<div class="auth-container">
    <div class="auth-card">
        <h1>⚡ OptimizePro</h1>
        <p class="subtitle">Create your account to start managing inventory</p>
        <form method="POST">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" class="form-control"
                       value="{{ username|default('') }}" placeholder="Choose a username" required autofocus minlength="3">
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" class="form-control"
                       value="{{ email|default('') }}" placeholder="your@email.com" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" class="form-control"
                       placeholder="At least 6 characters" required minlength="6">
            </div>
            <div class="form-group">
                <label for="confirm_password">Confirm Password</label>
                <input type="password" id="confirm_password" name="confirm_password" class="form-control"
                       placeholder="Repeat your password" required>
            </div>
            <button type="submit" class="btn btn-primary">Create Account</button>
        </form>
        <div class="auth-footer">
            Already have an account? <a href="{{ url_for('auth.login') }}">Sign in</a>
        </div>
    </div>
</div>
{% endblock %}
